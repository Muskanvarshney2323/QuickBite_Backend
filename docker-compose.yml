services:
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: quickbite-api-gateway
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - PORT=8080
    networks:
      - quickbite-network
    depends_on:
      - auth-service
      - cart-service
      - order-service
      - menu-service
      - restaurant-service
      - payment-service
      - delivery-agent-service
      - review-service
      - notification-service

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: quickbite-auth-service
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=8080
    networks:
      - quickbite-network

  cart-service:
    build:
      context: ./services/cart-service
      dockerfile: Dockerfile
    container_name: quickbite-cart-service
    ports:
      - "8082:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=8080
    networks:
      - quickbite-network

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: quickbite-order-service
    ports:
      - "8083:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=8080
    networks:
      - quickbite-network

  menu-service:
    build:
      context: ./services/menu-service
      dockerfile: Dockerfile
    container_name: quickbite-menu-service
    ports:
      - "8084:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=8080
    networks:
      - quickbite-network

  restaurant-service:
    build:
      context: ./services/restaurant-service
      dockerfile: Dockerfile
    container_name: quickbite-restaurant-service
    ports:
      - "8085:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=8080
    networks:
      - quickbite-network

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: quickbite-payment-service
    ports:
      - "8086:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=8080
    networks:
      - quickbite-network

  delivery-agent-service:
    build:
      context: ./services/delivery-agent-service
      dockerfile: Dockerfile
    container_name: quickbite-delivery-agent-service
    ports:
      - "8087:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=8080
    networks:
      - quickbite-network

  review-service:
    build:
      context: ./services/review-service
      dockerfile: Dockerfile
    container_name: quickbite-review-service
    ports:
      - "8088:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=8080
    networks:
      - quickbite-network

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: quickbite-notification-service
    ports:
      - "8089:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=8080
    networks:
      - quickbite-network

networks:
  quickbite-network:
    driver: bridge
